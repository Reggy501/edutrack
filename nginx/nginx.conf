events {
    worker_connections 1024;
}

http {
    upstream student_service {
        server student-service:8000;
    }

    upstream attendance_service {
        server attendance-service:8000;
    }

    upstream grades_service {
        server grades-service:8000;
    }

    upstream auth_service {
        server auth-service:8000;
    }

    upstream notification_service {
        server notification-service:8000;
    }

    server {
        listen 80;

        location /api/students/ {
            proxy_pass http://student_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/attendance/ {
            proxy_pass http://attendance_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/grades/ {
            proxy_pass http://grades_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/auth/ {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/notifications/ {
            proxy_pass http://notification_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            return 200 '{"message": "EduTrack API Gateway", "version": "1.0", "services": ["students", "attendance", "grades", "auth", "notifications"]}';
            add_header Content-Type application/json;
        }
    }
}
